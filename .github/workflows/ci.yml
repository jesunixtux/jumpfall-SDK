name: SDK validation

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate included template
        run: python jumpfall_sdk.py validate templates/content-mod
      - name: Build an example package
        run: python jumpfall_sdk.py pack templates/content-mod -o dist/template.jfmod
